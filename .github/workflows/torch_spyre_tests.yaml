name: tests

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to check out and test
        required: false
        type: string
        default: ''
      repository:
        description: Full clone URL of the fork to check out (e.g. "https://github.com/myuser/torch-spyre.git"); leave empty for the base repo
        required: true
        type: string
        default: ''
      pr_url_hash:
        description: |
          Hash of the full URL of the PR that triggered this run.
          Required when triggered by an external PR.
        required: true
        type: string
      rpm_location:
        description: The Artifactory location where to download the RPM from
        required: false
        type: string
        default: ''
      rpm_names:
        description: A space separated list of RPM names to download and install
        required: false
        type: string
        default: ''
      build_torch_spyre:
        description: Whether to re-build torch-spyre after installing the RPM
        required: false
        type: boolean
        default: true
      runner_label:
        description: |
          Per-PR ephemeral runner-set IMAGE label to select
          (image_spyre_backend_pr_<component>_<sha12>, e.g. image_spyre_backend_pr_flex_8ddcf3e155e9).
          Empty = use the standing image_spyre_backend set (the RPM is then installed at
          runtime via rpm_names; the ephemeral flow leaves this set and rpm_names empty).
        required: false
        type: string
        default: ''
      test_type:
        description: >-
          Suite subset to run: smoke | core | full | suite_<group> | <label>.
          Default: full (every config).
        required: false
        type: string
        default: full

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'pull_request' && github.event.pull_request.html_url) || (github.event_name == 'workflow_dispatch'
    && inputs.pr_url_hash != '' && inputs.pr_url_hash) || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: read # so that gh pr view can fetch the file list

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: changes
  #
  # Runs on every PR and merge-queue check. Delegates to the shared
  # detect-doc-only-change composite action, which checks if any file outside
  # tests/docs/, docs/, README.md, or CODEOWNERS was modified.
  #
  # code_changed=true  --> non-doc files changed  --> run tests
  # code_changed=false --> only doc/CODEOWNERS files changed --> skip tests
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Check which paths changed
        id: filter
        uses: ./.github/actions/detect-doc-only-change

  # ---------------------------------------------------------------------------
  # Job 2: delegate to the shared test matrix
  #
  # Only runs when `changes.code_changed == 'true'`. For docs-only PRs the
  # reusable workflow is never invoked — no hardware runners are consumed.
  # ---------------------------------------------------------------------------
  run-tests:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'

    uses: ./.github/workflows/_test_matrix.yaml
    with:
      runner_label: linux
      # Per-PR ephemeral image label when provided, else the standing set.
      image_label: ${{ inputs.runner_label || 'image_spyre_backend' }}
      extra_test_flags: -v -m "not xfail"
      extra_test_flags_multi_spyre: -v
      checkout_pytorch: false
      ref: ${{ inputs.ref || '' }}
      repository: ${{ inputs.repository || '' }}
      rpm_location: ${{ inputs.rpm_location || '' }}
      rpm_names: ${{ inputs.rpm_names || '' }}
      build_torch_spyre: ${{ inputs.build_torch_spyre == true }}
      test_type: ${{ inputs.test_type || 'full' }}
    runs-on:
      - x86_64
      - spyre_pf_x1
      - linux
      - image_torch_spyre
    timeout-minutes: 60
    env:
      # The CI env var is very important.
      # GitHub actions automatically sets CI=true
      # which causes the pytest inductor tests to fail with AssertionError
      # due to a mix of fallbacks and decompositions.
      # Here we set it to an empty string (or we could also unset it).
      CI: ''
      CLONED_TORCH_SPYRE_DIR: /home/senuser/torch-spyre

    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: Test Device Enum
            config: torch_spyre_tests/test_device_enum_config.yaml
          - name: Test Fallbacks
            config: torch_spyre_tests/test_fallbacks_config.yaml
          - name: Test Modules
            config: torch_spyre_tests/test_modules_config.yaml
          - name: Test Regex
            config: torch_spyre_tests/test_regex_config.yaml
          - name: Test Spyre
            config: torch_spyre_tests/test_spyre_config.yaml
          - name: Test Spyre Lazy Silent
            config: torch_spyre_tests/test_spyre_lazy_silent_config.yaml
          - name: Test Stream
            config: torch_spyre_tests/test_stream_config.yaml
          - name: Test Spyre Profiler
            config: torch_spyre_tests/test_spyre_profiler_config.yaml
          - name: Test Prepare Kernel
            config: torch_spyre_tests/test_prepare_kernel_config.yaml
          # Inductor tests
          - name: Inductor Building Blocks
            config: torch_spyre_tests/inductor/test_building_blocks_config.yaml
          - name: Inductor Codegen
            config: torch_spyre_tests/inductor/test_codegen_config.yaml
          - name: Inductor Decomp
            config: torch_spyre_tests/inductor/test_decomp_config.yaml
          - name: Inductor FX Passes
            config: torch_spyre_tests/inductor/test_inductor_fx_passes_config.yaml
          - name: Inductor Normalization Scalars
            config: torch_spyre_tests/inductor/test_normalization_scalars_config.yaml
          - name: Inductor Ops
            config: torch_spyre_tests/inductor/test_inductor_ops_config.yaml
          - name: Inductor Ops LX Planning
            config: torch_spyre_tests/inductor/test_ops_lx_planning_config.yaml
          - name: Inductor Scalar
            config: torch_spyre_tests/inductor/test_inductor_scalar_config.yaml
          - name: Inductor Logging
            config: torch_spyre_tests/inductor/test_logging_config.yaml
          - name: Inductor Dedup Constants
            config: torch_spyre_tests/inductor/test_dedup_constants_config.yaml
          - name: Inductor Padding
            config: torch_spyre_tests/inductor/test_padding_config.yaml
          - name: Inductor Overwrite
            config: torch_spyre_tests/inductor/test_overwrite.yaml
          - name: Inductor Restickify
            config: torch_spyre_tests/inductor/test_restickify_config.yaml
          - name: Inductor Scratchpad Patterns
            config: torch_spyre_tests/inductor/test_scratchpad_patterns_config.yaml
          - name: Inductor Scratchpad Use
            config: torch_spyre_tests/inductor/test_scratchpad_use_config.yaml
          - name: Inductor Dtype Scalars
            config: torch_spyre_tests/inductor/test_dtype_scalars_config.yaml
          - name: Inductor Cache
            config: torch_spyre_tests/inductor/test_cache_config.yaml
          - name: Inductor Scratchpad Solver
            config: torch_spyre_tests/inductor/test_scratchpad_solver_config.yaml
          # Tensor tests
          - name: Tensor Coordinates
            config: torch_spyre_tests/tensors/test_coordinates_config.yaml
          - name: Tensor It Space Splits
            config: torch_spyre_tests/tensors/test_it_space_splits_config.yaml
          - name: Tensor Layout
            config: torch_spyre_tests/tensors/test_tensor_layout_config.yaml
          - name: Inductor Layernorm
            config: torch_spyre_tests/inductor/test_layernorm_config.yaml

    steps:
      # Sparse checkout into the GHA workspace so the local composite
      # actions under .github/actions/ are available. The pre-cloned
      # repo at $CLONED_TORCH_SPYRE_DIR is what the tests actually run
      # against.
      - name: Checkout composite actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/checkout-prebuilt-torch-spyre

      - uses: ./.github/actions/gather-runner-info
        with:
          verbose: 'true'

      - uses: ./.github/actions/build-torch-spyre

      - name: Run ${{ matrix.suite.name }} tests
        run: |
          source "$HOME/.bashrc"
          source /etc/profile.d/ibm-aiu-setup.sh
          cd "$CLONED_TORCH_SPYRE_DIR"
          source .venv/bin/activate

          CONFIG="${{ matrix.suite.config }}"

          echo "Running ${{ matrix.suite.name }} tests..."
          bash tests/run_test.sh "tests/configs/${CONFIG}" -v --capture=sys
          echo "${{ matrix.suite.name }} tests done"


  # ---------------------------------------------------------------------------
  # Job 3: run-spyre-unit-tests (required check gate)
  #
  # This job name MUST match the branch protection required check exactly:
  #   "tests / Run Spyre unit tests"
  #
  # It fans in the reusable workflow result. Three outcomes are handled:
  #
  #   run-tests result = success -> all suites passed      -> green
  #   run-tests result = skipped -> docs-only PR, no tests -> green (instant)
  #   run-tests result = failure -> one or more suites bad -> red   (blocks merge)
  # ---------------------------------------------------------------------------
  run-spyre-unit-tests:
    name: Run Spyre unit tests
    runs-on: ubuntu-latest
    needs: [changes, run-tests]
    if: always()
    steps:
      - name: Evaluate test results
        run: |-
          RESULT="${{ needs.run-tests.result }}"
          echo "run-tests result: ${RESULT}"

          if [[ "${RESULT}" == "success" ]]; then
            echo "All test suites passed."
            exit 0
          fi

          if [[ "${RESULT}" == "skipped" ]]; then
            echo "Tests skipped — docs-only change, no test-relevant files modified."
            exit 0
          fi

          echo "One or more test suites failed or were cancelled."
          exit 1
